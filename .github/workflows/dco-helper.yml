name: 🤖 DCO Helper

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: dco-helper-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dco-helper:
    name: Validate DCO Sign-offs
    runs-on: ubuntu-latest

    if: |
      github.event.pull_request.draft == false &&
      github.actor != 'github-actions[bot]'

    steps:
      - name: Check DCO Sign-offs
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const pr = context.payload.pull_request;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prNumber = pr.number;
            const username = pr.user.login;

            // --------------------------------------------------
            // BOT CHECK
            // --------------------------------------------------

            if (
              pr.user.type === 'Bot' ||
              username.endsWith('[bot]')
            ) {
              core.info('Skipping bot PR');
              return;
            }

            // --------------------------------------------------
            // OUTDATED RUN PROTECTION
            // --------------------------------------------------

            const eventHeadSha =
              context.payload.pull_request.head.sha;

            let currentHeadSha =
              eventHeadSha;

            try {

              const livePr =
                await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber
                });

              currentHeadSha =
                livePr.data.head.sha;

            } catch (error) {

              core.warning(
                `Failed fetching latest PR state: ${error.message}`
              );
            }

            if (currentHeadSha !== eventHeadSha) {

              core.info(
                `Outdated workflow run detected. Current SHA: ${currentHeadSha}, event SHA: ${eventHeadSha}`
              );

              return;
            }

            // --------------------------------------------------
            // FETCH COMMITS
            // --------------------------------------------------

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100
              }
            );

            if (commits.length === 0) {

              core.info('No commits found');
              return;
            }

            // --------------------------------------------------
            // STRICT DCO VALIDATION
            // --------------------------------------------------

            const signoffRegex =
              /^Signed-off-by:\s+.+\s+<[^<>]+>\s*$/im;

            const invalidCommits = [];

            for (const commit of commits) {

              const message =
                commit.commit.message || '';

              if (!signoffRegex.test(message)) {

                invalidCommits.push(
                  commit.sha.substring(0, 7)
                );
              }
            }

            const missingDCO =
              invalidCommits.length > 0;

            // --------------------------------------------------
            // LABELS
            // --------------------------------------------------

            const VERIFIED_LABEL =
              'dco-verified';

            const MISSING_LABEL =
              'dco-missing';

            async function safeRemoveLabel(name) {

              try {

                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name
                });

                core.info(
                  `Removed label: ${name}`
                );

              } catch (e) {

                core.info(
                  `Label ${name} not present`
                );
              }
            }

            async function safeAddLabel(name) {

              try {

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: [name]
                });

                core.info(
                  `Added label: ${name}`
                );

              } catch (e) {

                core.warning(
                  `Failed adding label ${name}: ${e.message}`
                );
              }
            }

            // --------------------------------------------------
            // SMART LABEL MANAGEMENT
            // --------------------------------------------------

            const existingLabels =
              (pr.labels || []).map(
                l => l.name
              );

            if (missingDCO) {

              if (
                !existingLabels.includes(
                  MISSING_LABEL
                )
              ) {

                await safeAddLabel(
                  MISSING_LABEL
                );
              }

              if (
                existingLabels.includes(
                  VERIFIED_LABEL
                )
              ) {

                await safeRemoveLabel(
                  VERIFIED_LABEL
                );
              }

            } else {

              if (
                !existingLabels.includes(
                  VERIFIED_LABEL
                )
              ) {

                await safeAddLabel(
                  VERIFIED_LABEL
                );
              }

              if (
                existingLabels.includes(
                  MISSING_LABEL
                )
              ) {

                await safeRemoveLabel(
                  MISSING_LABEL
                );
              }
            }

            // --------------------------------------------------
            // STICKY COMMENT
            // --------------------------------------------------

            const MARKER =
              '<!-- dco-helper-comment -->';

            let body = '';

            if (missingDCO) {

              body =
                `${MARKER}\n` +
                `## ⚠️ DCO Sign-off Missing\n\n` +
                `Hi @${username} 👋\n\n` +
                `Some commits in this PR are missing a valid \`Signed-off-by\` line.\n\n` +

                `### Invalid Commits\n\n` +

                invalidCommits
                  .map(sha => `- \`${sha}\``)
                  .join('\n') +

                `\n\n` +

                `### Fix Single Commit\n\n` +

                '```bash\n' +
                'git commit --amend --signoff\n' +
                'git push --force-with-lease\n' +
                '```\n\n' +

                `### Fix Multiple Commits\n\n` +

                '```bash\n' +
                'git rebase --signoff HEAD~N\n' +
                'git push --force-with-lease\n' +
                '```\n\n' +

                `This comment updates automatically after fixes are pushed.`;

            } else {

              body =
                `${MARKER}\n` +
                `## ✅ DCO Sign-off Verified\n\n` +
                `Hi @${username} 👋\n\n` +
                `All commits in this PR contain valid \`Signed-off-by\` lines.\n\n` +
                `Thank you for following the DCO requirements 🚀`;
            }

            // --------------------------------------------------
            // FIND EXISTING COMMENT
            // --------------------------------------------------

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page: 100
                }
              );

            const existing =
              comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body &&
                comment.body.includes(MARKER)
              );

            // --------------------------------------------------
            // AVOID UNNECESSARY COMMENT UPDATES
            // --------------------------------------------------

            if (
              existing &&
              existing.body.trim() === body.trim()
            ) {

              core.info(
                'Comment already up-to-date'
              );

              return;
            }

            // --------------------------------------------------
            // UPDATE COMMENT
            // --------------------------------------------------

            if (existing) {

              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });

              core.info(
                'Updated sticky DCO comment'
              );

            } else {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });

              core.info(
                'Created sticky DCO comment'
              );
            }

            // --------------------------------------------------
            // SUMMARY
            // --------------------------------------------------

            await core.summary
              .addHeading(
                'DCO Validation Result'
              )
              .addRaw(
                missingDCO
                  ? '❌ Missing sign-offs detected'
                  : '✅ All commits signed off'
              )
              .write();
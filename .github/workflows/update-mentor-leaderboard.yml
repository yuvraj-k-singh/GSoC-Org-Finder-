name: 🏆 Update Mentor Leaderboard

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  generate-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate mentor leaderboard
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ------------------------------------------------
            // Load mentors
            // ------------------------------------------------

            const mentorFile =
              'reviewers/gssoc-mentors.json';

            const mentorData = JSON.parse(
              fs.readFileSync(mentorFile, 'utf8')
            );

            const mentors =
              mentorData.reviewers || [];

            // ------------------------------------------------
            // Fetch PRs
            // ------------------------------------------------

            const prs = await github.paginate(
              github.rest.pulls.list,
              {
                owner,
                repo,
                state: 'all',
                per_page: 100
              }
            );

            const stats = {};

            for (const mentor of mentors) {

              stats[mentor] = {
                username: mentor,
                reviews: 0,
                approvals: 0,
                comments: 0,
                score: 0,
                last_active: null
              };
            }

            // ------------------------------------------------
            // Process reviews
            // ------------------------------------------------

            for (const pr of prs) {

              const reviews =
                await github.paginate(
                  github.rest.pulls.listReviews,
                  {
                    owner,
                    repo,
                    pull_number: pr.number,
                    per_page: 100
                  }
                );

              for (const review of reviews) {

                const reviewer =
                  review.user?.login;

                if (
                  !reviewer ||
                  !stats[reviewer]
                ) {
                  continue;
                }

                stats[reviewer].reviews++;

                if (
                  review.state === 'APPROVED'
                ) {
                  stats[reviewer].approvals++;
                  stats[reviewer].score += 5;
                } else {
                  stats[reviewer].score += 2;
                }

                stats[reviewer].comments++;

                const submittedAt =
                  new Date(review.submitted_at);

                const currentLast =
                  stats[reviewer].last_active;

                if (
                  !currentLast ||
                  submittedAt > new Date(currentLast)
                ) {
                  stats[reviewer].last_active =
                    submittedAt.toISOString();
                }
              }
            }

            // ------------------------------------------------
            // Build leaderboard
            // ------------------------------------------------

            const leaderboard = {
              generated_at:
                new Date().toISOString(),

              mentors:
                Object.values(stats)
                  .sort(
                    (a, b) =>
                      b.score - a.score
                  )
            };

            // ------------------------------------------------
            // Save leaderboard
            // ------------------------------------------------

            fs.writeFileSync(
              'reviewers/mentor-leaderboard.json',
              JSON.stringify(
                leaderboard,
                null,
                2
              )
            );

            core.info(
              'Mentor leaderboard generated'
            );

      - name: Commit leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reviewers/mentor-leaderboard.json

          git diff --cached --quiet || git commit -m "chore: update mentor leaderboard"

          git push
name: Update Mentor Leaderboard

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-mentor-leaderboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate leaderboard
        run: node .github/scripts/generate-mentor-leaderboard.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update mentor leaderboard"
          title: "chore: update mentor leaderboard"
          body: |
            Automated mentor leaderboard update.
          branch: automation/mentor-leaderboard
          delete-branch: true
          signoff: true
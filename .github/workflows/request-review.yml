name: Request Reviewers (Stage 2)

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: request-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request:
    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'stage-1-approved') &&
      (
        contains(github.event.pull_request.labels.*.name, 'gssoc26') ||
        contains(github.event.pull_request.labels.*.name, 'nsoc') ||
        contains(github.event.pull_request.labels.*.name, 'general-oss')
      )

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Select active mentors
        id: pick
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MAX_REVIEWERS: 2

          EXISTING_REQUESTED: >-
            ${{ toJson(github.event.pull_request.requested_reviewers.*.login) }}

          EXISTING_REVIEWERS: >-
            ${{ toJson(github.event.pull_request.requested_reviewers.*.login) }}

          RECENT_MENTOR_PINGS: "[]"

        run: |
          echo "result=$(node .github/scripts/select-active-mentors.js)" >> "$GITHUB_OUTPUT"

      - name: Request mentor reviews
        uses: actions/github-script@v8

        env:
          SELECTED: ${{ steps.pick.outputs.result }}

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number =
              context.payload.pull_request.number;

            let parsed = {};
            let selected = [];

            // ----------------------------------------
            // SAFE PARSE
            // ----------------------------------------

            try {

              parsed = JSON.parse(
                process.env.SELECTED || '{}'
              );

              selected = Array.isArray(parsed.selected)
                ? parsed.selected
                : [];

            } catch (error) {

              core.warning(
                `Failed to parse SELECTED: ${error.message}`
              );

              return;
            }

            // ----------------------------------------
            // NO REVIEWERS
            // ----------------------------------------

            if (!selected.length) {

              core.info(
                'No mentors selected, skipping review request.'
              );

              return;
            }

            // ----------------------------------------
            // REQUEST REVIEWERS
            // ----------------------------------------

            try {

              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: selected
              });

              core.info(
                `Requested mentors: ${selected.join(', ')}`
              );

            } catch (error) {

              core.warning(
                `requestReviewers failed: ${error.message}`
              );
            }

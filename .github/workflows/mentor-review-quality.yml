name: Mentor Review Quality

on:
  pull_request_review:
    types:
      - submitted

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: mentor-review-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  quality:

    # --------------------------------------------------
    # SECURITY + VALIDATION GUARD
    # --------------------------------------------------

    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.review.user.type != 'Bot' &&
      github.event.review.user.login != github.event.pull_request.user.login

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      # --------------------------------------------------
      # DETECT LOW-EFFORT REVIEW
      # --------------------------------------------------

      - name: Detect low-effort review
        id: quality

        env:
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_STATE: ${{ github.event.review.state }}

        run: |
          echo "result=$(node .github/scripts/detect-low-effort-review.js)" >> "$GITHUB_OUTPUT"

      # --------------------------------------------------
      # VALIDATE REVIEWER IS ACTUAL MENTOR
      # --------------------------------------------------

      - name: Validate mentor reviewer
        id: mentor-check

        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const fs = require('fs');

            const reviewer =
              context.payload.review.user.login
                .toLowerCase();

            function safeRead(path) {

              try {

                return JSON.parse(
                  fs.readFileSync(path, 'utf8')
                );

              } catch {

                return {};
              }
            }

            const gssoc =
              safeRead('.github/reviewers/gssoc-mentors.json');

            const nsoc =
              safeRead('.github/reviewers/nsoc-reviewers.json');

            const mentors = [

              ...(gssoc.reviewers || []),
              ...(nsoc.reviewers || [])

            ]
              .map(v => String(v).trim().toLowerCase())
              .filter(Boolean);

            const isMentor =
              mentors.includes(reviewer);

            core.info(
              `Reviewer ${reviewer} mentor status: ${isMentor}`
            );

            core.setOutput(
              'is_mentor',
              String(isMentor)
            );

      # --------------------------------------------------
      # POST WARNING COMMENT
      # --------------------------------------------------

      - name: Post mentor review quality warning

        if: |
          fromJson(steps.quality.outputs.result).lowEffort == true &&
          steps.mentor-check.outputs.is_mentor == 'true'

        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |

            const owner =
              context.repo.owner;

            const repo =
              context.repo.repo;

            const issue_number =
              context.payload.pull_request.number;

            const marker =
              '<!-- mentor-review-quality-warning -->';

            const body =
              `${marker}\n` +
              `⚠️ Low-effort mentor review detected. ` +
              `Please provide actionable feedback.`;

            // --------------------------------------------------
            // FIND EXISTING BOT COMMENT
            // --------------------------------------------------

            let comments = [];

            try {

              const response =
                await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number,
                  per_page: 100
                });

              comments =
                response.data || [];

            } catch (error) {

              core.warning(
                `Failed fetching comments: ${error.message}`
              );

              return;
            }

            const existing =
              comments.find(comment =>

                comment.user &&
                comment.user.type === 'Bot' &&

                comment.body &&
                comment.body.includes(marker)
              );

            // --------------------------------------------------
            // SAFE COMMENT UPSERT
            // --------------------------------------------------

            try {

              if (existing) {

                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });

                core.info(
                  'Updated mentor review warning comment'
                );

              } else {

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body
                });

                core.info(
                  'Created mentor review warning comment'
                );
              }

            } catch (error) {

              core.warning(
                `Failed posting mentor review warning: ${error.message}`
              );
            }
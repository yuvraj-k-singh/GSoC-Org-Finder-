name: 🛡️ Duplicate & Spam Issue Guard

on:
  issues:
    types:
      - opened
      - edited

  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write

concurrency:
  group: duplicate-issue-guard-${{ github.event.issue.number || github.event.comment.id }}
  cancel-in-progress: true

jobs:
  validate-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Detect duplicate / spam issues
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const issue = context.payload.issue;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue_number = issue.number;
            const username = issue.user.login;

            const title = (issue.title || '').trim();
            const body = (issue.body || '').trim();

            const lowerText =
              `${title}\n${body}`.toLowerCase();

            // ─────────────────────────────────────────────
            // Ignore bots
            // ─────────────────────────────────────────────
            if (issue.user.type === 'Bot') {
              core.info('Ignoring bot issue');
              return;
            }

            // ─────────────────────────────────────────────
            // Ignore research issues
            // ─────────────────────────────────────────────
            const labels =
              (issue.labels || []).map(
                l => l.name.toLowerCase()
              );

            if (labels.includes('research')) {
              core.info('Research issue detected');
              return;
            }

            // ─────────────────────────────────────────────
            // Helper → update existing bot comment
            // ─────────────────────────────────────────────
            async function upsertComment(marker, body) {

              const comments =
                await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number,
                  per_page: 100
                });

              const existing =
                comments.data.find(c =>
                  c.user.type === 'Bot' &&
                  c.body.includes(marker)
                );

              if (existing) {

                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });

              } else {

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body
                });

              }
            }

            // ─────────────────────────────────────────────
            // LOW-EFFORT DETECTION
            // Only obvious prompt dumps
            // ─────────────────────────────────────────────
            const blockedPatterns = [
              'as an ai language model',
              'here is the prompt',
              'generated by chatgpt',
              'this issue was generated',
              'auto-generated issue',
              'give complete code',
              'write full implementation'
            ];

            const detectedPrompt =
              blockedPatterns.find(p =>
                lowerText.includes(p)
              );

            if (detectedPrompt) {

              const bodyText =
                `## 🚫 Low-Quality Issue Detected\n\n` +
                `Hi @${username}, this issue appears to contain autogenerated or prompt-style content.\n\n` +
                `Detected pattern: \`${detectedPrompt}\`\n\n` +
                `Please rewrite the issue with:\n` +
                `- actual repository context\n` +
                `- expected behavior\n` +
                `- technical explanation\n` +
                `- reproducible details`;

              await upsertComment(
                'Low-Quality Issue Detected',
                bodyText
              );

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['low-quality-issue']
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Duplicate detection
            // Only for short/simple issues
            // ─────────────────────────────────────────────

            // Detailed issues bypass duplicate checks
            if (
              title.length > 80 ||
              body.length > 800
            ) {
              core.info('Detailed issue detected');
              return;
            }

            const existingIssues =
              await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100
                }
              );

            const normalize = str =>
              str
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();

            const current =
              normalize(title);

            let duplicateIssue = null;

            for (const existing of existingIssues) {

              if (existing.number === issue_number)
                continue;

              if (existing.pull_request)
                continue;

              const existingLabels =
                (existing.labels || []).map(
                  l => l.name.toLowerCase()
                );

              if (
                existingLabels.includes('research')
              ) continue;

              const existingTitle =
                normalize(existing.title || '');

              // Exact match only
              if (existingTitle === current) {
                duplicateIssue = existing;
                break;
              }
            }

            // ─────────────────────────────────────────────
            // Duplicate found
            // ─────────────────────────────────────────────
            if (duplicateIssue) {

              const bodyText =
                `## 🔁 Duplicate Issue Detected\n\n` +
                `Hi @${username}, this appears to duplicate:\n\n` +
                `➡️ #${duplicateIssue.number}\n\n` +
                `To keep discussion centralized, this issue may be closed.\n\n` +
                `If you believe this is different, please provide additional technical context.`;

              await upsertComment(
                'Duplicate Issue Detected',
                bodyText
              );

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['duplicate']
              });

              return;
            }

            // ─────────────────────────────────────────────
            // Assignment quality check
            // Only on /assign
            // ─────────────────────────────────────────────
            if (
              context.eventName === 'issue_comment'
            ) {

              const comment =
                context.payload.comment.body.toLowerCase();

              const wantsAssign =
                comment.includes('/assign') ||
                comment.includes('assign me');

              if (!wantsAssign)
                return;

              if (
                title.length < 10 ||
                body.length < 50
              ) {

                await upsertComment(
                  'Assignment Quality Warning',
                  `## ⚠️ Assignment Blocked\n\n` +
                  `Hi @${username}, this issue needs more detail before assignment.\n\n` +
                  `Please improve:\n` +
                  `- clearer title\n` +
                  `- technical explanation\n` +
                  `- reproduction details`
                );

                return;
              }
            }

            core.info('Issue validation passed');

name: Issue Context Assignment

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

concurrency:
  group: issue-assignment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  assign:
    if: |
      github.event.issue.pull_request == null &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect command
        id: cmd
        uses: actions/github-script@v8
        with:
          script: |
            const body = (context.payload.comment.body || '').trim();
            const assignMatch  = /^\/assign$/i.test(body);
            const approveMatch = body.match(/^\/approve-assignment\s+@?([\w-]+)/i);
            core.setOutput('is_assign',   String(assignMatch));
            core.setOutput('is_approve',  String(!!approveMatch));
            core.setOutput('target_user', approveMatch ? approveMatch[1].toLowerCase() : '');

      # ── PATH A: /assign ────────────────────────────────────────────────────

      - name: Validate issue (assign)
        id: validate
        if: steps.cmd.outputs.is_assign == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number    = context.payload.issue.number;
            const claimant        = context.payload.comment.user.login;
            const issue = (await github.rest.issues.get({ owner, repo, issue_number })).data;
            if (issue.state !== 'open' || issue.locked) {
              core.setOutput('eligible', 'false');
              core.setOutput('reason', 'Issue is closed or locked.');
              return;
            }
            if ((issue.assignees || []).length > 0) {
              core.setOutput('eligible', 'false');
              core.setOutput('reason', 'Issue already has an assignee.');
              return;
            }
            core.setOutput('eligible', 'true');
            core.setOutput('claimant', claimant);
            core.setOutput('issue_number', String(issue_number));

      - name: Select active mentors for ping
        id: select_mentors
        if: steps.cmd.outputs.is_assign == 'true' && steps.validate.outputs.eligible == 'true'
        env:
          ISSUE_CLAIMANT:   ${{ steps.validate.outputs.claimant }}
          EXCLUDED_MENTORS: '[]'
          MAX_MENTORS:      '2'
        run: |
          RESULT=$(node .github/scripts/select-issue-mentors.js)
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "Selected mentors: $RESULT"

      - name: Queue assignment and ping mentors
        if: steps.cmd.outputs.is_assign == 'true' && steps.validate.outputs.eligible == 'true'
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER:     ${{ steps.validate.outputs.issue_number }}
          CLAIMANT:         ${{ steps.validate.outputs.claimant }}
          SELECTED_MENTORS_JSON: ${{ steps.select_mentors.outputs.result }}
        with:
          script: |
            const { execSync }    = require('child_process');
            const { owner, repo } = context.repo;
            const issue_number    = parseInt(process.env.ISSUE_NUMBER, 10);
            const claimant        = process.env.CLAIMANT;
            let selected = [];
            try {
              selected = JSON.parse(process.env.SELECTED_MENTORS_JSON || '{}').selected || [];
            } catch { selected = []; }

            execSync('node .github/scripts/update-pending-assignments.js', {
              env: { ...process.env, OPERATION: 'queue', ISSUE_NUMBER: String(issue_number),
                     CLAIMANT: claimant, SELECTED_MENTORS: JSON.stringify(selected) }
            });

            const marker      = '<!-- assignment-status -->';
            const mentionList = selected.length
              ? selected.map(m => `@${m}`).join(' and ')
              : '_no active mentors available — a maintainer will review manually_';

            const body = [
              marker, '',
              '## ⏳ Assignment Queued — Awaiting Mentor Approval', '',
              `@${claimant} your request has been **queued**.`, '',
              `The following active mentor(s) have been notified and have **24 hours** to approve:`, '',
              `> ${mentionList}`, '',
              '**Mentors:** to approve, reply with:', '```',
              `/approve-assignment @${claimant}`, '```', '',
              '_If no mentor approves within 24 hours, fresh active mentors will be automatically selected._'
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
            core.info(`Assignment queued for ${claimant}, pinged: ${selected.join(', ')}`);

      - name: Commit updated queue (assign)
        if: steps.cmd.outputs.is_assign == 'true' && steps.validate.outputs.eligible == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]`@users.noreply.github.com`"
          git add .github/reviewers/pending-assignments.json
          git diff --cached --quiet || git commit -m "chore: queue assignment for ${{ steps.validate.outputs.claimant }} on issue #${{ steps.validate.outputs.issue_number }} [skip ci]"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"

      # ── PATH B: /approve-assignment `@username` ──────────────────────────────

      - name: Process mentor approval
        id: process_approval
        if: steps.cmd.outputs.is_approve == 'true'
        uses: actions/github-script@v8
        env:
          TARGET_USER: ${{ steps.cmd.outputs.target_user }}
        with:
          script: |
            const { execSync }    = require('child_process');
            const { owner, repo } = context.repo;
            const issue_number    = context.payload.issue.number;
            const approver        = context.payload.comment.user.login.toLowerCase();
            const marker          = '<!-- assignment-status -->';
            let result;
            try {
              const out = execSync('node .github/scripts/update-pending-assignments.js', {
                env: { ...process.env, OPERATION: 'approve',
                       ISSUE_NUMBER: String(issue_number), APPROVER: approver }
              }).toString();
              result = JSON.parse(out);
            } catch (e) {
              core.warning(`Approval script error: ${e.message}`);
              return;
            }
            if (!result.ok) {
              if (result.error === 'not_found') {
                core.info('No pending assignment found for this issue — skipping.');
              } else if (result.error === 'not_authorized') {
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `⛔ @${approver} — you are not one of the currently pinged mentors. Only ${(result.authorized || []).map(m => `@${m}`).join(' or ')} can approve.`
                });
              }
              return;
            }
            const claimant = result.claimant || process.env.TARGET_USER;
            await github.rest.issues.addAssignees({ owner, repo, issue_number, assignees: [claimant] });
            const comments = await github.paginate(
              github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(c => c.body && c.body.includes(marker));
            const body = [
              marker, '',
              '## ✅ Issue Assigned', '',
              `Assigned to @${claimant} — approved by @${approver}.`, '',
              '_One active assignee; inactive assignments may be rotated._'
            ].join('\n');
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
            core.info(`Issue #${issue_number} assigned to ${claimant} by mentor ${approver}`);
            core.setOutput('assigned', 'true');

      - name: Commit queue after approval
        if: steps.cmd.outputs.is_approve == 'true' && steps.process_approval.outputs.assigned == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]`@users.noreply.github.com`"
          git add .github/reviewers/pending-assignments.json
          git diff --cached --quiet || git commit -m "chore: assignment approved for issue #${{ github.event.issue.number }} [skip ci]"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"

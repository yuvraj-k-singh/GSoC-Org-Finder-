name: Mentor Assignment Expiry Check

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: write

concurrency:
  group: mentor-assignment-expiry
  cancel-in-progress: false

jobs:
  check-expiry:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find expired pending assignments
        id: expired
        run: |
          RESULT=$(node .github/scripts/update-pending-assignments.js)
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "Expired entries: $RESULT"
        env:
          OPERATION: expire

      - name: Re-ping with fresh mentors
        uses: actions/github-script@v8
        env:
          EXPIRED_RESULT: ${{ steps.expired.outputs.result }}
        with:
          script: |
            const { execSync }    = require('child_process');
            const { owner, repo } = context.repo;
            const marker          = '<!-- assignment-status -->';
            let expiredList = [];
            try {
              expiredList = JSON.parse(process.env.EXPIRED_RESULT).expired || [];
            } catch {
              core.info('No expired assignments or parse error.');
              return;
            }
            if (!expiredList.length) { core.info('No expired assignments.'); return; }

            for (const entry of expiredList) {
              const { issue_number, claimant } = entry;
              const previousMentors = entry.pinged_mentors || [];
              let newMentors = [];
              try {
                const out = execSync('node .github/scripts/select-issue-mentors.js', {
                  env: { ...process.env, ISSUE_CLAIMANT: claimant,
                         EXCLUDED_MENTORS: JSON.stringify(previousMentors), MAX_MENTORS: '2' }
                }).toString();
                newMentors = JSON.parse(out).selected || [];
              } catch (e) {
                core.warning(`Mentor selection failed for issue #${issue_number}: ${e.message}`);
              }
              execSync('node .github/scripts/update-pending-assignments.js', {
                env: { ...process.env, OPERATION: 're-ping', ISSUE_NUMBER: String(issue_number),
                       SELECTED_MENTORS: JSON.stringify(newMentors) }
              });
              const mentionList = newMentors.length
                ? newMentors.map(m => `@${m}`).join(' and ')
                : '_no active mentors available — a maintainer will review manually_';
              const prevList = previousMentors.length
                ? previousMentors.map(m => `@${m}`).join(', ')
                : 'the previous mentors';
              const comments = await github.paginate(
                github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 }
              );
              const existing = comments.find(c => c.body && c.body.includes(marker));
              const body = [
                marker, '',
                '##  Assignment Queue — Mentor Rotation', '',
                `@${claimant} the 24-hour window for ${prevList} has elapsed.`, '',
                `New active mentors have a fresh **24-hour window** to approve:`, '',
                `> ${mentionList}`, '',
                '**Mentors:** to approve, reply with:', '```',
                `/approve-assignment @${claimant}`, '```'
              ].join('\n');
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              }
              core.info(`Re-pinged for issue #${issue_number}: ${newMentors.join(', ')}`);
            }

      - name: Commit updated queue
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]`@users.noreply.github.com`"
          git add .github/reviewers/pending-assignments.json
          git diff --cached --quiet && echo "No queue changes" && exit 0
          git commit -m "chore: rotate expired assignment mentors [skip ci]"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
